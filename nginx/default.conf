# Main Nginx configuration for production.
# This file serves the React app and proxies Django routes.

server {
    listen 80;
    server_name djangoclickmart.in www.djangoclickmart.in;

    # Let Certbot verify domain ownership for SSL renewal.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all normal HTTP traffic to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name djangoclickmart.in www.djangoclickmart.in;

    ssl_certificate /etc/letsencrypt/live/djangoclickmart.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/djangoclickmart.in/privkey.pem;

    # Proxy API requests to Django backend.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Django admin to backend.
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve React frontend for all other routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # Serve Django static files.
    location /static/ {
        alias /var/www/static/;
    }

    # Serve uploaded media files.
    location /media/ {
        alias /var/www/media/;
    }
}
