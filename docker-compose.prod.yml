version: "3.9"

services:
  # PostgreSQL database for production
  db:
    image: postgres:16-alpine
    container_name: clickmart-db
    env_file:
      - ./backend/.env.production
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Django backend with Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clickmart-backend
    env_file:
      - ./backend/.env.production
    environment:
      DB_ENGINE: postgresql
      DB_HOST: db
      DB_PORT: 5432
      USE_PROXY_HEADERS: "True"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn clickmart_main.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    restart: unless-stopped

  # Nginx reverse proxy for frontend + backend API
  nginx:
    image: nginx:alpine
    container_name: clickmart-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Serve the built frontend files
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Nginx config
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (generated by Certbot)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Static/media files from Django
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_static:
  backend_media:
